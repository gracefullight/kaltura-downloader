name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      ext-release-created: ${{ steps.release.outputs['apps/ext--release_created'] }}
      ext-tag-name: ${{ steps.release.outputs['apps/ext--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build-and-release:
    name: Build & Upload Extension
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.ext-release-created == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build

      - name: Package extension
        run: cd apps/ext/dist && zip -r ../../../kaltura-downloader-${{ needs.release-please.outputs.ext-tag-name }}.zip .

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release-please.outputs.ext-tag-name }}" "kaltura-downloader-${{ needs.release-please.outputs.ext-tag-name }}.zip"
